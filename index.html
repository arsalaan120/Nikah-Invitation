<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Osama & Sana | Nikah Invitation</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ width:100%; background:#1c0306; }
  body{ -webkit-tap-highlight-color:transparent; }

  .stage{
    position:fixed;
    inset:0;
    overflow:auto;
    background:#1c0306;
    transition:opacity .55s ease;
  }
  .stage.leaving{ opacity:0; }

  .frame{
    position:relative;
    width:100%;
    line-height:0;
    font-size:0;
  }
  .frame img{
    width:100%;
    height:auto;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  .hot{
    position:absolute;
    border:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    display:block;
    border-radius:40px;
    background:rgba(227,201,138,0);
    box-shadow:0 0 0 rgba(227,201,138,0);
    transition:background-color .45s ease, box-shadow .45s ease;
  }
  .hot:focus-visible{
    outline:2px solid rgba(227,201,138,.9);
    outline-offset:3px;
  }
  .hot.firing{
    background:rgba(227,201,138,.85);
    box-shadow:0 0 26px 6px rgba(227,201,138,.55);
  }

  /* INSHAALLAH button — re-measured directly from hero.jpg pixel coordinates
     (border box: x 341–679, y 1182–1265 out of 1024×1536), with a small
     comfortable margin added around it for an easy tap target */
  #btnEnter{
    left:31.5%;
    width:37%;
    top:75.5%;
    height:7.4%;
  }
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="frame">
      <img src="assets/hero.jpg" alt="Bismillah and Surah Ar-Rum, Verse 21 — We created you in pairs">
      <button class="hot" id="btnEnter" type="button" aria-label="Continue to invitation — Inshaallah"></button>
    </div>
  </div>

<script>
  (function(){
    var stage = document.getElementById('stage');
    var btnEnter = document.getElementById('btnEnter');

    btnEnter.addEventListener('click', function(){
      if (btnEnter.classList.contains('firing')) return;
      btnEnter.classList.add('firing');

      setTimeout(function(){
        stage.classList.add('leaving');
      }, 420);

      setTimeout(function(){
        window.location.href = 'invitation.html';
      }, 950);
    });
  })();
</script>

</body>
</html>
